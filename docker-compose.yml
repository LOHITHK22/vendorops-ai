services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vendorops
      POSTGRES_USER: vendorops
      POSTGRES_PASSWORD: vendorops
    ports:
      - "5432:5432"
    volumes:
      - vendorops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendorops -d vendorops"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: vendorops-ai-backend:local
    environment:
      APP_ENV: container
      APP_DEBUG: "false"
      API_PREFIX: /v1
      DATABASE_URL: postgresql+asyncpg://vendorops:vendorops@postgres:5432/vendorops
      STORAGE_BACKEND: local
      MAX_UPLOAD_SIZE_MB: "25"
      LOCAL_STORAGE_DIR: /app/storage
      REPORTS_DIR: /app/reports_out
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      EXTRACTION_MAX_ATTEMPTS: "3"
      EXTRACTION_RETRY_BASE_SECONDS: "0.4"
      CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - vendorops_storage:/app/storage
      - vendorops_reports:/app/reports_out
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: vendorops-ai-frontend:local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  vendorops_postgres:
  vendorops_storage:
  vendorops_reports:
